<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Stock Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    width: 90%;
    margin: auto;
}

select, input, button {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

canvas {
    background: white;
    border-radius: 12px;
}

table {
    margin: auto;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    padding: 10px;
    border: 1px solid black;
}
</style>
</head>

<body>

<div class="container">
    <h1>📈 Real Stock & Commodity Predictor</h1>

    <select id="stock">
        <option value="AAPL">Apple</option>
        <option value="TSLA">Tesla</option>
        <option value="GOOG">Google</option>
        <option value="TCS.NS">TCS</option>
        <option value="WIPRO.NS">Wipro</option>
        <option value="TATAMOTORS.NS">Tata Motors</option>
        <option value="GC=F">Gold</option>
        <option value="SI=F">Silver</option>
    </select>

    <input type="number" id="days" value="7" min="1" max="30">

    <button onclick="loadData()">🚀 Predict</button>

    <h2>📊 Chart</h2>
    <canvas id="chart"></canvas>

    <h2>🔮 Prediction</h2>
    <p id="prediction"></p>

    <h2>📅 Future Table</h2>
    <table id="table">
        <thead>
            <tr>
                <th>Day</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let chart;

// EMA function (more realistic than simple trend)
function calculateEMA(data, period = 10) {
    let ema = [];
    let k = 2 / (period + 1);

    ema[0] = data[0];

    for (let i = 1; i < data.length; i++) {
        ema[i] = data[i] * k + ema[i - 1] * (1 - k);
    }

    return ema;
}

async function loadData() {
    const stock = document.getElementById("stock").value;
    const days = parseInt(document.getElementById("days").value);

    const url = `https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/${stock}`;
    const res = await fetch(url);
    const data = await res.json();

    const prices = data.chart.result[0].indicators.quote[0].close;
    const timestamps = data.chart.result[0].timestamp;

    const labels = timestamps.map(t => {
        return new Date(t * 1000).toLocaleDateString();
    });

    const ema = calculateEMA(prices);

    // ---------- FUTURE PREDICTION (EMA BASED) ----------
    let futurePrices = [];
    let futureLabels = [];
    let lastPrice = prices[prices.length - 1];
    let lastEMA = ema[ema.length - 1];

    let tableBody = document.querySelector("#table tbody");
    tableBody.innerHTML = "";

    for (let i = 1; i <= days; i++) {
        // realistic smoothing prediction
        let next = lastPrice + (lastPrice - lastEMA) * 0.5;

        futurePrices.push(next);
        futureLabels.push("Day " + i);

        tableBody.innerHTML += `
            <tr>
                <td>Day ${i}</td>
                <td>${next.toFixed(2)}</td>
            </tr>
        `;

        lastPrice = next;
        lastEMA = (lastEMA + next) / 2;
    }

    document.getElementById("prediction").innerText =
        `Estimated after ${days} days: ${lastPrice.toFixed(2)}`;

    // ---------- CHART ----------
    if (chart) chart.destroy();

    const ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [...labels, ...futureLabels],
            datasets: [
                {
                    label: "Price",
                    data: prices,
                    borderWidth: 2,
                    tension: 0.3
                },
                {
                    label: "EMA",
                    data: ema,
                    borderDash: [5,5],
                    tension: 0.3
                },
                {
                    label: "Prediction",
                    data: [...Array(prices.length).fill(null), ...futurePrices],
                    borderDash: [2,2],
                    tension: 0.3
                }
            ]
        }
    });
}
</script>

</body>
</html>
